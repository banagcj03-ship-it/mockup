<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arel portfolio</title>
    <style>
    body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            color: white;
            text-align: center;
        }
    nav {
        background: #b84dff;
        padding: 10px;
    }
    nav a {
        margin: 10px;
        padding: 8px 15px;
        background: #d580ff;
        border-radius: 20px;
        text-decoration: none;
        color: white;
        font-weight: bold;
    }
    section {
        padding: 50px 20px;
    }
    .card {
        background: rgba(255, 255, 255, 0.2);
        padding: 20px;
        border-radius: 15px;
        display: inline-block;
        margin-top: 20px;
    }
    /* profile image */
    .profile {
        width: 120px;
        border-radius: 15px;
    }
    /* buttons */
    .btn {
        display: block;
        margin: 10px auto;
        padding: 10px;
        width: 200px;
        background: #b84dff;
        border-radius: 20p;
    }
    /* skills grid */
    .skills {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }
    .skill-box {
        background: #b84dff;
        margin: 10px;
        padding: 15px;
        border-radius: 15px;
        width: 120px;
    }
    /* projects */
    .projects {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }
    .project-box {
        background: #b84dff;
        margin: 10px;
        padding: 20px;
        border-radius: 15px;
        width: 150px;
    }
    /* contact */
    .contact-btn {
        margin: 10px;
        padding: 10px;
        background: #b84dff;
        border-radius: 20px;
    }
    </style>
</head>
<body>
    
<!--navbar-->
    <nav>
        <a href="#home">home</a>
        <a href="about">about me</a>
        <a href="skills">skills</a>
        <a href="projects">project</a>
        <a href="contact">contact</a>
</nav>

<!--home-->
<section id="home">
    <h1>i'm arel</h1>
    <p>welcome to my profile</p>
    <div class="card">
        <img src="120" class="profile">
    </div>
</section>
</body>
</html>
